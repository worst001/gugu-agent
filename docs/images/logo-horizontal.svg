<svg width="940" height="260" viewBox="0 0 940 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wordmark" x1="270" y1="68" x2="770" y2="188" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3F2419"/>
      <stop offset="1" stop-color="#A76032"/>
    </linearGradient>
    <linearGradient id="chip" x1="274" y1="174" x2="614" y2="174" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6E7"/>
      <stop offset="1" stop-color="#FFE1B7"/>
    </linearGradient>
    <filter id="iconShadow" x="4" y="8" width="252" height="252" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
