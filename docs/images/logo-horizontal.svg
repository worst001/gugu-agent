  </text>
  <rect x="272" y="182" width="354" height="42" rx="21" fill="url(#chip)" stroke="#E8B77E"/>
  <text x="294" y="210" fill="#7B4E32" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0">
